name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - python-version: '3.11'
            python-architecture: 'x86'
            arch-label: 'x86'
          - python-version: '3.11'
            python-architecture: 'x64'
            arch-label: 'x64'

    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} (${{ matrix.python-architecture }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.python-architecture }}

      - name: Verify Python architecture
        run: |
          python -c "import struct; arch = struct.calcsize('P') * 8; print(f'Python {arch}-bit')"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyinstaller

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Build EXE with PyInstaller
        run: pyinstaller capture_tool.spec --clean --noconfirm

      - name: List build output
        run: |
          echo "=== Build output ==="
          dir dist\PlaywrightCapture\

      - name: Create ZIP archive
        run: |
          cd dist
          7z a -tzip "PlaywrightCapture_${{ matrix.arch-label }}.zip" PlaywrightCapture\
          echo "=== ZIP created ==="
          dir "PlaywrightCapture_${{ matrix.arch-label }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlaywrightCapture-${{ matrix.arch-label }}
          path: dist/PlaywrightCapture_${{ matrix.arch-label }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: PlaywrightCapture-x86
          path: ./artifacts/x86

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: PlaywrightCapture-x64
          path: ./artifacts/x64

      - name: List artifacts
        run: |
          echo "=== Artifacts ==="
          dir /s /b artifacts\

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/x86/PlaywrightCapture_x86.zip
            artifacts/x64/PlaywrightCapture_x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
